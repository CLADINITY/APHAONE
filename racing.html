<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AdCash - Earn by Watching Ads</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="card hero">
      <h1>💸 AdCash</h1>
      <p>Earn coins by watching short ads and redeem rewards.</p>
    </header>

    <section class="card balance">
      <h2>Your Wallet</h2>
      <div class="amount"><span id="coinBalance">0</span> coins</div>
      <small>1 ad watch = 15 coins</small>
    </section>

    <section class="card ad-player">
      <h2>Watch & Earn</h2>
      <p id="adStatus">Ready to watch your next ad.</p>
      <div class="progress-wrap">
        <div id="adProgress"></div>
      </div>
      <button id="watchBtn">Watch Ad</button>
    </section>

    <section class="card rewards">
      <h2>Redeem Rewards</h2>
      <div class="reward-list">
        <button class="reward-btn" data-cost="100">Mobile Top-up (100)</button>
        <button class="reward-btn" data-cost="250">Gift Card (250)</button>
        <button class="reward-btn" data-cost="500">Cash Out (500)</button>
      </div>
      <p id="rewardMessage">Choose a reward when you have enough coins.</p>
    </section>
  </main>

  <script>
    const WATCH_SECONDS = 8;
    const COINS_PER_AD = 15;
    const STORAGE_KEY = 'adcash-coins';

    const coinBalanceEl = document.getElementById('coinBalance');
    const watchBtn = document.getElementById('watchBtn');
    const adStatus = document.getElementById('adStatus');
    const adProgress = document.getElementById('adProgress');
    const rewardMessage = document.getElementById('rewardMessage');
    const rewardButtons = document.querySelectorAll('.reward-btn');

    let coins = Number(localStorage.getItem(STORAGE_KEY) || 0);
    let watching = false;

    function renderCoins() {
      coinBalanceEl.textContent = coins;
      localStorage.setItem(STORAGE_KEY, coins);
    }

    function runAdSimulation() {
      if (watching) return;
      watching = true;
      watchBtn.disabled = true;
      adStatus.textContent = 'Ad started... stay on this screen to earn coins.';

      let currentSecond = 0;
      adProgress.style.width = '0%';

      const timer = setInterval(() => {
        currentSecond += 1;
        const percent = (currentSecond / WATCH_SECONDS) * 100;
        adProgress.style.width = `${percent}%`;

        if (currentSecond >= WATCH_SECONDS) {
          clearInterval(timer);
          coins += COINS_PER_AD;
          renderCoins();
          adStatus.textContent = `Ad completed! +${COINS_PER_AD} coins added.`;
          watchBtn.disabled = false;
          watching = false;
        }
      }, 1000);
    }

    function redeemReward(cost, label) {
      if (coins < cost) {
        rewardMessage.textContent = `Not enough coins for ${label}. Need ${cost - coins} more.`;
        return;
      }

      coins -= cost;
      renderCoins();
      rewardMessage.textContent = `Success! ${label} redeemed for ${cost} coins.`;
    }

    watchBtn.addEventListener('click', runAdSimulation);

    rewardButtons.forEach((button) => {
      button.addEventListener('click', () => {
        const cost = Number(button.dataset.cost);
        redeemReward(cost, button.textContent);
      });
    });

    renderCoins();
  </script>
</body>
</html>
